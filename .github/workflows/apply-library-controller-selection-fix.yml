name: Apply Library Controller Selection Fix

on:
  push:
    branches:
      - "agent/library-controller"

permissions:
  contents: write

jobs:
  apply:
    if: ${{ !contains(github.event.head_commit.message, 'Use SelectionState API in library controller') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/library-controller
          fetch-depth: 0

      - name: Apply controller selection patch
        run: python scripts/apply_library_controller_selection_fix.py

      - name: Commit branch patch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Use SelectionState API in library controller"
          git push origin HEAD:agent/library-controller
