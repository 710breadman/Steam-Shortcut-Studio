name: Source CLI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  source-cli:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install runtime dependencies
        run: python -m pip install --upgrade pip -r requirements.txt
      - name: Compile source CLI
        run: python -m py_compile steam_shortcut_studio/source_cli.py
      - name: Run source CLI tests
        run: python tests/source_cli_test.py
