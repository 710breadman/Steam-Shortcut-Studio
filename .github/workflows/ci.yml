name: CI

on:
  push:
    branches:
      - main
      - "agent/**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependencies
        run: python -m pip install --upgrade pip -r requirements.txt

      - name: Compile package
        run: python -m compileall -q steam_shortcut_studio tests main.py

      - name: Run existing smoke suite
        run: python tests/smoke_test.py

      - name: Run foundation tests
        run: python tests/foundation_test.py

      - name: Run selection summary tests
        run: python tests/selection_summary_test.py

      - name: Run selection action tests
        run: python tests/selection_actions_test.py

      - name: Run selection target tests
        run: python tests/selection_targets_test.py

      - name: Run transaction contract tests
        run: python tests/transaction_test.py

      - name: Run verified file transaction tests
        run: python tests/file_transaction_test.py

      - name: Run transactional shortcut tests
        run: python tests/shortcut_transaction_test.py

      - name: Run desktop transaction wiring tests
        run: python tests/app_transaction_wiring_test.py

      - name: Run transaction history tests
        run: python tests/transaction_history_test.py

      - name: Run transaction history controller tests
        run: python tests/transaction_history_controller_test.py

      - name: Run transaction history view tests
        run: python tests/transaction_history_view_test.py

      - name: Run background job queue tests
        run: python tests/job_queue_test.py

      - name: Run bulk artwork coordinator tests
        run: python tests/bulk_artwork_test.py

      - name: Run artwork provider adapter tests
        run: python tests/artwork_provider_adapter_test.py

      - name: Run artwork search service tests
        run: python tests/artwork_search_service_test.py

      - name: Run artwork queue status tests
        run: python tests/artwork_queue_status_test.py

      - name: Run metadata target tests
        run: python tests/metadata_targets_test.py

      - name: Run metadata service factory tests
        run: python tests/metadata_service_factory_test.py

      - name: Run artwork review workspace tests
        run: python tests/artwork_review_workspace_test.py

      - name: Run Epic manifest source tests
        run: python tests/epic_source_test.py

      - name: Run Steam and folder source tests
        run: python tests/steam_folder_source_test.py

      - name: Run combined scan plan tests
        run: python tests/scan_plan_test.py

      - name: Run game merge tests
        run: python tests/game_merge_test.py

      - name: Run library persistence tests
        run: python tests/library_store_test.py

      - name: Run modern library view tests
        run: python tests/modern_library_view_test.py

      - name: Run source scan persistence tests
        run: python tests/source_scan_test.py

      - name: Run source scan UI state tests
        run: python tests/source_scan_ui_state_test.py

      - name: Run library controller tests
        run: python tests/library_controller_test.py

      - name: Run UI library adapter tests
        run: python tests/ui_library_adapter_test.py

      - name: Run settings store tests
        run: python tests/settings_store_test.py

      - name: Run CLI tests
        run: python tests/cli_test.py

      - name: Run artwork image validation tests
        run: python tests/image_validation_test.py

      - name: Run atomic artwork transaction tests
        run: python tests/artwork_transaction_test.py

      - name: Run production atomic artwork tests
        run: python tests/artwork_live_transaction_test.py

  ui-prototype:
    name: UI prototype import / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install optional prototype dependency
        run: python -m pip install --upgrade pip -r requirements-ui-prototype.txt

      - name: Compile modern prototypes
        run: python -m py_compile prototypes/modern_shell.py prototypes/modern_library.py

      - name: Import modern shells without creating a window
        run: python -c "import runpy; shell = runpy.run_path('prototypes/modern_shell.py', run_name='prototype_import'); library = runpy.run_path('prototypes/modern_library.py', run_name='prototype_library_import'); assert 'ModernShell' in shell; assert 'load_library_games' in library"

      - name: Run persistent library prototype mapping tests
        run: python tests/prototype_library_test.py

      - name: Run prototype shell selection tests
        run: python tests/prototype_shell_selection_test.py
