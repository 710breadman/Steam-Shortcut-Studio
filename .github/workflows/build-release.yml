name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: SteamShortcutStudio-Windows
            asset_path: dist/SteamShortcutStudio.exe
          - os: ubuntu-latest
            artifact_name: SteamShortcutStudio-Linux
            asset_path: dist/SteamShortcutStudio-Linux
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Tk dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk tk-dev

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Build Windows executable
        if: runner.os == 'Windows'
        run: python -m PyInstaller --noconfirm --clean SteamShortcutStudio.spec

      - name: Build Linux executable
        if: runner.os == 'Linux'
        run: >
          python -m PyInstaller --noconfirm --clean --onefile --windowed
          --name SteamShortcutStudio-Linux
          --add-data "steam_shortcut_studio/assets/sss.png:steam_shortcut_studio/assets"
          --add-data "steam_shortcut_studio/assets/sss.ico:steam_shortcut_studio/assets"
          --collect-all PIL
          --collect-all certifi
          main.py

      - name: Mark Linux binary executable
        if: runner.os == 'Linux'
        run: chmod +x dist/SteamShortcutStudio-Linux

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_path }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_path }}
