name: Library Controller Diagnostic

on:
  push:
    branches:
      - "agent/library-controller"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Capture controller test
        shell: bash
        run: |
          set +e
          python tests/library_controller_test.py > library-controller.log 2>&1
          code=$?
          cat library-controller.log
          printf '%s\n' "$code" > library-controller.exit
          exit 0
      - name: Upload diagnostic output
        uses: actions/upload-artifact@v4
        with:
          name: library-controller-diagnostic
          path: |
            library-controller.log
            library-controller.exit
          if-no-files-found: error
      - name: Fail when test failed
        shell: bash
        run: test "$(cat library-controller.exit)" = "0"
