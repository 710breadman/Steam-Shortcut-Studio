name: App Wiring Check

on:
  pull_request:
  push:
    branches:
      - "agent/live-transaction-integration"

permissions:
  contents: read

jobs:
  app-wiring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run isolated desktop wiring test
        run: python tests/app_transaction_wiring_test.py
